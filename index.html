<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8" />

<title>Lookpub </title>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />

</head>

<body>



<header>

<div class="main-title">Lookpub</div>

<div class="sub-title">AR</div>

</header>



<!-- hello -->

<div class="ar-section">

<div class="head-title">hello</div>

<div class="sub-title">hello</div>

<model-viewer id="model1"
     src="hello.glb"
     ios-src="hello.usdz"
     ar
     ar-modes="scene-viewer webxr quick-look"
     camera-controls
     autoplay
     animation-name="*"
     auto-rotate
     shadow-intensity="1"
     shadow-softness="1"
     environment-image="neutral.hdr"
     loading="eager"
     reveal="auto"
     style="width: 100%; height: 400px;">
</model-viewer>

</div>

<button class="ar-button" onclick="triggerAR('model1')">Play AR</button>

</div>



<!-- บ้านลูกแพร-->

<div class="ar-section">

<div class="head-title">บ้านลูกแพร</div>

<div class="sub-title">The design concept from my name, Prae </div>

<model-viewer id="model2"

     src="บ้านลูกแพร.glb"

     ios-src="บ้านลูกแพร.usdz"

     ar

     ar-modes="scene-viewer webxr quick-look"

     camera-controls

     autoplay

     auto-rotate

     shadow-intensity="1"

     shadow-softness="1"

     environment-image="neutral.hdr"

     loading="eager"

     reveal="auto"

     style="width: 100%; height: 400px;">

</model-viewer>

<button class="ar-button" onclick="triggerAR('model2')">Play AR</button>

</div>
     
<!-- character-->

<div class="ar-section">

<div class="head-title">character</div>

<div class="sub-title">The design concept is fun character </div>

<model-viewer id="model2"

     src="character.glb"

     ios-src="character.usdz"

     ar

     ar-modes="scene-viewer webxr quick-look"

     camera-controls

     autoplay

     auto-rotate

     shadow-intensity="1"

     shadow-softness="1"

     environment-image="neutral.hdr"

     loading="eager"

     reveal="auto"

     style="width: 100%; height: 400px;">

</model-viewer>

<button class="ar-button" onclick="triggerAR('model2')">Play AR</button>

</div>


<footer>

<div class="footer-link"><strong>Instagram:</strong> <a href="https://surl.li/rgbbqy" target="_blank">instagram.com/p3lth_</a></div>


</footer>



<!-- ✅ โหลด model-viewer หลังสุดเพื่อให้โหลดหน้าเว็บเร็วขึ้น -->

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>



<!-- ✅ Script ปุ่ม Play AR พร้อม catch error -->

<script>

   function triggerAR(id) {

     const viewer = document.getElementById(id);

     if (viewer && viewer.activateAR) {

       viewer.activateAR().catch((error) => {

         alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือถูกบล็อกโดย browser\n(แนะนำให้กดปุ่ม AR บนมุมขวาของโมเดลแทน)");

         console.warn("activateAR failed:", error);

       });

     }

   }

</script>



</body>

</html>
